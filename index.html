<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to react--yugagarwalportfolio.netlify.app</title>
    
    <!-- Canonical tag ensures SEO authority transfers to the new domain -->
    <link rel="canonical" href="https://react--yugagarwalportfolio.netlify.app/">
    
    <!-- Prevents search engines from indexing the redirect page itself -->
    <meta name="robots" content="noindex">
    
    <!-- Instant JavaScript Redirect -->
    <script>
        (function() {
            var newDomain = "https://react--yugagarwalportfolio.netlify.app";
            
            // Extract all URL parts
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;
            
            // Construct exact equivalent URL
            var newUrl = newDomain + path + search + hash;
            
            // location.replace() is critical: it prevents the redirect page 
            // from being saved in browser history, keeping the 'Back' button functional.
            window.location.replace(newUrl);
        })();
    </script>

    <!-- Meta refresh fallback for clients with JavaScript disabled -->
    <!-- Note: Fallback routes to homepage as it cannot dynamically read URL paths -->
    <noscript>
        <meta http-equiv="refresh" content="0; url=https://react--yugagarwalportfolio.netlify.app/">
    </noscript>
</head>
<body>
    <p>We have moved! Redirecting to <a href="https://react--yugagarwalportfolio.netlify.app/">react--yugagarwalportfolio.netlify.app</a>...</p>
</body>
</html>
